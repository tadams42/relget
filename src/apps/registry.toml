[logging]
title = "Logging"
description = "Utilities that allow easier browsing of logs in terminal. Most of them really need\nthat logs are in correct, strict data format. If you want something that just works\nand tries very hard to parse every conceivable log format without you needing to\nwrite any kind of template or regex, use `lnav`. To take absolute control on parsing\nand converting logs use `vector`. Everything else here is pretty eye-candy that will\nnot work most of the time for most of your logs.\n"

[[logging.apps]]
id = "gonzo"
exe_name = "gonzo"
url = "https://github.com/control-theory/gonzo"
description = "A powerful, real-time log analysis.\n\n  - native streaming of OpenTelemetry.\n  - automatic detection of JSON, logfmt, and plain text logs\n  - can define custom templates for log formats in config file\n  - powerful TUI\n  - also provides embedded WebUI from the same running process\n"
has_musl = false
man_pages = "unavailable"
shell_completions = "self_generated"

[[logging.apps]]
id = "hl"
exe_name = "hl"
url = "https://github.com/pamburus/hl"
description = "Fast log viewer for `JSON` or `logfmt` logs."
has_musl = true
man_pages = "unavailable"
shell_completions = "self_generated"

[[logging.apps]]
id = "lazyjournal"
exe_name = "lazyjournal"
url = "https://github.com/Lifailon/lazyjournal"
description = "TUI for browsing systemd journal and Docker logs"
has_musl = false
man_pages = "unavailable"
shell_completions = "unavailable"

[[logging.apps]]
id = "lnav"
exe_name = "lnav"
url = "https://github.com/tstack/lnav"
description = "Tries really hard to figure out structure in \"not-so-structured\" input data\n(logs). Most of the time works like a magic, extracting maximum of structured\ndata from your logs without you needing to define single line of capture\ntemplate or regex. Aggregates everything into TUI and provides syntax\nhighlighting, filtering, and SQL querying\n"
has_musl = true
man_pages = "bundled"
shell_completions = "unavailable"

[[logging.apps]]
id = "logdy"
exe_name = "logdy"
url = "https://github.com/logdyhq/logdy-core"
description = "Aggregates log input and then starts (self-hosted, embedded) Web UI that can be used for viewing and filtering them. Multiple input modes (files, stdin, sockets, REST API)"
has_musl = false
man_pages = "unavailable"
shell_completions = "self_generated"

[[logging.apps]]
id = "loggo"
exe_name = "loggo"
url = "https://github.com/aurc/loggo"
description = "Define one or more local or remote (SSH) log streams. Then see them all\naggregated to single TUI on your local machine. The only problem is that they\nshould really be in correctly structured JSON, for this utility to be useful.\n"
has_musl = false
man_pages = "unavailable"
shell_completions = "self_generated"

[[logging.apps]]
id = "nerdlog"
exe_name = "nerdlog"
url = "https://github.com/dimonomid/nerdlog"
description = "SSH to (one or more) remote host(s), and live view one or more logs in TUI\n"
has_musl = false
man_pages = "unavailable"
shell_completions = "unavailable"

[[logging.apps]]
